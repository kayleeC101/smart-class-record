<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 수업 기록부 PRO - 꿈 소믈리에 x Gemini</title>
    <!-- 외부 라이브러리 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print { .no-print { display: none; } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // 아이콘 컴포넌트
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- 초기 설정 기본 데이터 ---
        const INITIAL_SCHOOL = "OO중학교";
        const INITIAL_SUBJECT = "진로와 직업";
        const INITIAL_TEACHER = "홍길동";
        const INITIAL_PLAN = Array.from({ length: 34 }, (_, i) => ({
            week: i + 1,
            topic: `${i + 1}주차 수업 주제`,
            activity: "상세 활동 내용을 입력하세요."
        }));
        const INITIAL_STUDENTS = {
            "1-1": Array.from({length: 25}, (_, i) => ({id: i+1, name: `학생 ${i+1}`}))
        };
        const INITIAL_KEYWORDS = ["날카로운 질문", "자기주도성 우수", "협력적 태도", "창의적 아이디어", "논리적 근거", "성실한 참여"];

        const App = () => {
            const [viewMode, setViewMode] = useState('grid'); 
            const [currentClass, setCurrentClass] = useState('');
            const [selectedWeek, setSelectedWeek] = useState(1);
            const [searchQuery, setSearchQuery] = useState("");
            const [toast, setToast] = useState({ show: false, message: "" });
            
            // 데이터 상태
            const [schoolName, setSchoolName] = useState(INITIAL_SCHOOL);
            const [subjectName, setSubjectName] = useState(INITIAL_SUBJECT);
            const [teacherName, setTeacherName] = useState(INITIAL_TEACHER);
            const [lessonPlan, setLessonPlan] = useState(INITIAL_PLAN);
            const [studentData, setStudentData] = useState(INITIAL_STUDENTS);
            const [records, setRecords] = useState({});
            const [customKeywords, setCustomKeywords] = useState(INITIAL_KEYWORDS);
            const [newKeyword, setNewKeyword] = useState("");

            // 로컬 스토리지 키 정의
            const STORAGE_KEYS = {
                SCHOOL: 'dream_school_name_v7',
                SUBJECT: 'dream_subject_name_v7',
                TEACHER: 'dream_teacher_name_v7',
                PLAN: 'dream_lesson_v7_final',
                STUDENTS: 'dream_students_v7_final',
                RECORDS: 'dream_records_v7_final',
                KEYWORDS: 'dream_keywords_v7_final'
            };

            useEffect(() => {
                const sn = localStorage.getItem(STORAGE_KEYS.SCHOOL);
                const sj = localStorage.getItem(STORAGE_KEYS.SUBJECT);
                const tn = localStorage.getItem(STORAGE_KEYS.TEACHER);
                const l = localStorage.getItem(STORAGE_KEYS.PLAN);
                const s = localStorage.getItem(STORAGE_KEYS.STUDENTS);
                const r = localStorage.getItem(STORAGE_KEYS.RECORDS);
                const k = localStorage.getItem(STORAGE_KEYS.KEYWORDS);

                if (sn) setSchoolName(sn);
                if (sj) setSubjectName(sj);
                if (tn) setTeacherName(tn);
                if (l) setLessonPlan(JSON.parse(l));
                if (s) {
                    const parsed = JSON.parse(s);
                    setStudentData(parsed);
                    const keys = Object.keys(parsed).sort();
                    if (keys.length > 0) setCurrentClass(keys[0]);
                } else {
                    setCurrentClass('1-1');
                }
                if (r) setRecords(JSON.parse(r));
                if (k) setCustomKeywords(JSON.parse(k));
                
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const showToast = (msg) => {
                setToast({ show: true, message: msg });
                setTimeout(() => setToast({ show: false, message: "" }), 2000);
            };

            const persist = (key, data) => {
                const value = typeof data === 'string' ? data : JSON.stringify(data);
                localStorage.setItem(key, value);
            };

            // --- 핸들러 함수들 ---

            // 학급 삭제 함수 (수정됨)
            const deleteClass = (className) => {
                if (window.confirm(`[${className}]의 모든 명단과 해당 학급의 수업 기록이 삭제됩니다. 계속하시겠습니까?`)) {
                    const newData = { ...studentData };
                    delete newData[className];
                    setStudentData(newData);
                    persist(STORAGE_KEYS.STUDENTS, newData);
                    
                    // 삭제한 학급의 기록도 정리 (선택사항이나 깔끔한 데이터 관리를 위해 권장)
                    const newRecords = { ...records };
                    Object.keys(newRecords).forEach(key => {
                        if (key.startsWith(`${className}-`)) delete newRecords[key];
                    });
                    setRecords(newRecords);
                    persist(STORAGE_KEYS.RECORDS, newRecords);

                    const keys = Object.keys(newData).sort();
                    setCurrentClass(keys.length > 0 ? keys[0] : '');
                    showToast(`${className} 삭제 완료`);
                }
            };

            // 주차 삭제 함수 (수정됨)
            const deleteWeek = (weekNum) => {
                if (window.confirm(`${weekNum}주차 정보를 삭제하시겠습니까? 삭제 후 주차 번호가 재정렬됩니다.`)) {
                    const newPlan = lessonPlan
                        .filter(lp => lp.week !== weekNum)
                        .map((lp, index) => ({ ...lp, week: index + 1 })); // 번호 재정렬
                    
                    setLessonPlan(newPlan);
                    persist(STORAGE_KEYS.PLAN, newPlan);
                    
                    if (selectedWeek === weekNum) setSelectedWeek(1);
                    else if (selectedWeek > weekNum) setSelectedWeek(prev => prev - 1);
                    
                    showToast(`${weekNum}주차 삭제 완료`);
                }
            };

            // 시스템 전체 초기화
            const handleResetSystem = () => {
                if (window.confirm("시스템을 처음 상태로 되돌리시겠습니까? 모든 명단과 기록이 삭제됩니다.")) {
                    if (window.confirm("진짜로 삭제하시겠습니까? (최종 확인)")) {
                        Object.values(STORAGE_KEYS).forEach(key => localStorage.removeItem(key));
                        setSchoolName(INITIAL_SCHOOL);
                        setSubjectName(INITIAL_SUBJECT);
                        setTeacherName(INITIAL_TEACHER);
                        setLessonPlan(INITIAL_PLAN);
                        setStudentData(INITIAL_STUDENTS);
                        setRecords({});
                        setCustomKeywords(INITIAL_KEYWORDS);
                        setCurrentClass('1-1');
                        setSelectedWeek(1);
                        setViewMode('grid');
                        showToast('시스템 초기화 완료');
                    }
                }
            };

            const handleUpdateRecord = (studentId, field, value) => {
                const key = `${currentClass}-${selectedWeek}-${studentId}`;
                const newRecords = { ...records, [key]: { ...records[key], studentId, className: currentClass, week: selectedWeek, [field]: value } };
                setRecords(newRecords);
                persist(STORAGE_KEYS.RECORDS, newRecords);
            };

            const addKeywordToMemo = (studentId, keyword) => {
                const key = `${currentClass}-${selectedWeek}-${studentId}`;
                const rec = records[key] || {};
                const updated = rec.memo ? `${rec.memo}, ${keyword}` : keyword;
                handleUpdateRecord(studentId, 'memo', updated);
            };

            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    const lines = content.split(/\r?\n/).filter(line => line.trim());
                    if (type === 'students') {
                        const newData = { ...studentData };
                        lines.slice(1).forEach(line => {
                            const cells = line.split(',').map(s => s.trim());
                            let cls, id, name;
                            if (cells.length >= 4) { cls = `${cells[0]}-${cells[1]}`; id = parseInt(cells[2]); name = cells[3]; }
                            else { cls = cells[0]; name = cells[1]; if (!newData[cls]) newData[cls] = []; id = newData[cls].length + 1; }
                            if (cls && name) {
                                if (!newData[cls]) newData[cls] = [];
                                if (!newData[cls].find(s => s.id === id)) newData[cls].push({ id, name });
                            }
                        });
                        Object.keys(newData).forEach(k => newData[k].sort((a, b) => a.id - b.id));
                        setStudentData(newData);
                        persist(STORAGE_KEYS.STUDENTS, newData);
                        const keys = Object.keys(newData).sort();
                        if (keys.length > 0) setCurrentClass(keys[0]);
                    } else if (type === 'plan') {
                        const newPlan = lines.slice(1).map(line => {
                            const cells = line.split(',').map(s => s.trim());
                            return { week: parseInt(cells[0]), topic: cells[1], activity: cells[2] };
                        }).filter(p => !isNaN(p.week));
                        setLessonPlan(newPlan);
                        persist(STORAGE_KEYS.PLAN, newPlan);
                    }
                    showToast('업로드 완료!');
                    e.target.value = '';
                };
                reader.readAsText(file, "EUC-KR");
            };

            const downloadSample = (type) => {
                let content = type === 'students' 
                    ? "학년,반,번호,성명\n1,1,1,강현우\n1,1,2,김민지" 
                    : "주차,주제,활동내용\n1,진로OT,나비매핑\n2,자기이해,강점찾기";
                const fileName = type === 'students' ? "학생명단_샘플.csv" : "로드맵_샘플.csv";
                const blob = new Blob(["\ufeff" + content], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                link.click();
            };

            const exportToCSV = () => {
                const header = ["학급", "주차", "수업주제", "번호", "이름", "태도", "성취", "메모"];
                const rows = [];
                Object.keys(studentData).forEach(cls => {
                    studentData[cls].forEach(student => {
                        lessonPlan.forEach(lp => {
                            const r = records[`${cls}-${lp.week}-${student.id}`];
                            if (r) rows.push([cls, lp.week, lp.topic, student.id, student.name, r.attitude||"보통", r.eval?"O":"X", (r.memo||"").replace(/,/g, " ")]);
                        });
                    });
                });
                const csv = "\ufeff" + [header, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${schoolName}_${subjectName}_기록_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            const classList = useMemo(() => Object.keys(studentData).sort(), [studentData]);
            const currentWeekData = useMemo(() => lessonPlan.find(lp => lp.week === selectedWeek), [lessonPlan, selectedWeek]);
            const filteredStudents = useMemo(() => {
                if (!currentClass || !studentData[currentClass]) return [];
                return studentData[currentClass].filter(s => s.name.includes(searchQuery) || s.id.toString() === searchQuery);
            }, [currentClass, studentData, searchQuery]);

            return (
                <div className="min-h-screen pb-24 relative">
                    {toast.show && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold animate-fade-in flex items-center gap-2">
                            <Icon name="check-circle-2" className="text-emerald-400" /> {toast.message}
                        </div>
                    )}

                    <header className="bg-slate-900 text-white sticky top-0 z-50 shadow-xl no-print border-b border-white/5">
                        <div className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-500 p-2 rounded-xl shadow-lg"><Icon name="clipboard-list" className="text-white" /></div>
                                <div>
                                    <h1 className="text-lg font-black tracking-tight text-white flex items-center gap-2">
                                        스마트 수업 기록부 <span className="text-amber-400 italic font-serif">PRO</span>
                                    </h1>
                                    <p className="text-[10px] text-amber-500/80 font-bold uppercase tracking-widest">
                                        {schoolName} • {subjectName} • {teacherName} 선생님
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap justify-center items-center gap-2">
                                <div className="flex bg-slate-800 rounded-lg p-1 border border-slate-700 max-w-[200px] sm:max-w-[300px] overflow-x-auto custom-scrollbar">
                                    {classList.map(cls => (
                                        <button key={cls} onClick={() => {setCurrentClass(cls); setViewMode('grid');}}
                                            className={`px-3 py-1.5 rounded-md text-xs font-bold whitespace-nowrap transition-all ${currentClass === cls ? 'bg-amber-500 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>{cls}</button>
                                    ))}
                                </div>
                                <select className="bg-slate-800 text-white text-xs rounded-lg px-3 py-2 outline-none border border-slate-700" value={selectedWeek} onChange={(e) => setSelectedWeek(Number(e.target.value))}>
                                    {lessonPlan.map(lp => <option key={lp.week} value={lp.week}>{lp.week}주차</option>)}
                                </select>
                                <div className="flex gap-1">
                                    <button onClick={() => setViewMode('grid')} className={`p-2 rounded-lg ${viewMode === 'grid' ? 'bg-indigo-600 shadow-lg' : 'bg-slate-800 text-slate-400'}`} title="기록 그리드"><Icon name="layout-grid" size={18}/></button>
                                    <button onClick={() => setViewMode('summary')} className={`p-2 rounded-lg ${viewMode === 'summary' ? 'bg-indigo-600 shadow-lg' : 'bg-slate-800 text-slate-400'}`} title="통합 리포트"><Icon name="file-text" size={18}/></button>
                                    <button onClick={() => setViewMode('settings')} className={`p-2 rounded-lg ${viewMode === 'settings' ? 'bg-indigo-600 shadow-lg' : 'bg-slate-800 text-slate-400'}`} title="환경 설정"><Icon name="settings" size={18}/></button>
                                </div>
                            </div>
                        </div>
                        {viewMode !== 'settings' && (
                            <div className="bg-slate-800 border-t border-slate-700 p-2 text-[11px] text-slate-300">
                                <div className="max-w-7xl mx-auto px-4 flex gap-4 truncate">
                                    <span className="font-black text-indigo-400 uppercase shrink-0">Topic</span> <span className="font-bold text-white truncate">{currentWeekData?.topic || "주제 없음"}</span>
                                    <span className="text-slate-600">|</span>
                                    <span className="font-black text-emerald-400 uppercase shrink-0">Activity</span> <span className="truncate text-slate-400">{currentWeekData?.activity || "상세 정보 없음"}</span>
                                </div>
                            </div>
                        )}
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-6 animate-fade-in pb-20">
                        {viewMode === 'grid' && (
                            <>
                                <div className="relative max-w-xl mx-auto mb-6 no-print">
                                    <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input type="text" placeholder={`${currentClass} 학생 검색...`} className="w-full bg-white rounded-2xl py-4 pl-12 shadow-sm border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none text-sm font-bold" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                </div>
                                {!currentClass ? (
                                    <div className="text-center py-20 bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
                                        <p className="text-slate-400 font-bold italic">설정에서 학급 명단을 먼저 등록해 주세요.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {filteredStudents.map(student => {
                                            const r = records[`${currentClass}-${selectedWeek}-${student.id}`] || { attitude: '보통', eval: false, memo: '' };
                                            return (
                                                <div key={student.id} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 hover:border-amber-200 transition-all group">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <div className="flex items-center gap-2"><span className="w-6 h-6 flex items-center justify-center bg-slate-900 text-white text-[10px] font-black rounded-full">{student.id}</span><h3 className="font-extrabold text-slate-800">{student.name}</h3></div>
                                                        <button onClick={() => handleUpdateRecord(student.id, 'eval', !r.eval)} className={`px-3 py-1 rounded-full text-[10px] font-black transition-all ${r.eval ? 'bg-emerald-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}`}>과업성취 {r.eval?'완료':'대기'}</button>
                                                    </div>
                                                    <div className="flex gap-1 mb-4">
                                                        {['노력', '보통', '우수', '매우우수'].map(lvl => (
                                                            <button key={lvl} onClick={() => handleUpdateRecord(student.id, 'attitude', lvl)} className={`flex-1 py-2 text-[9px] font-black rounded-xl border transition-all ${r.attitude===lvl ? 'bg-slate-800 text-white shadow-md border-slate-800' : 'bg-white text-slate-400 hover:border-slate-300'}`}>{lvl}</button>
                                                        ))}
                                                    </div>
                                                    <div className="flex flex-wrap gap-1 mb-3">
                                                        {customKeywords.map(kw => (
                                                            <button key={kw} onClick={() => addKeywordToMemo(student.id, kw)} className="px-2 py-0.5 bg-indigo-50 text-indigo-600 text-[8px] font-bold rounded-lg border border-indigo-100 hover:bg-indigo-600 hover:text-white transition-all active:scale-95">+ {kw}</button>
                                                        ))}
                                                    </div>
                                                    <textarea placeholder="관찰 특이사항 입력..." className="w-full bg-slate-50 border-none rounded-xl p-3 text-[11px] h-20 resize-none outline-none focus:ring-1 focus:ring-amber-500 transition-all font-medium" value={r.memo || ""} onChange={(e) => handleUpdateRecord(student.id, 'memo', e.target.value)} />
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </>
                        )}

                        {viewMode === 'summary' && (
                            <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 animate-fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                                    <h2 className="text-xl font-black text-slate-800 flex items-center gap-2"><Icon name="graduation-cap" className="text-indigo-600" /> {currentClass} 성장 리포트</h2>
                                    <div className="flex gap-2 no-print">
                                        <button onClick={exportToCSV} className="px-4 py-2 bg-emerald-600 text-white rounded-xl font-bold text-xs flex items-center gap-2 shadow-md hover:bg-emerald-500 transition-all"><Icon name="download" size={14}/> 전체 데이터 내보내기</button>
                                        <button onClick={() => window.print()} className="px-4 py-2 bg-slate-900 text-white rounded-xl font-bold text-xs flex items-center gap-2 shadow-md hover:bg-slate-800 transition-all"><Icon name="printer" size={14} /> 인쇄/PDF 저장</button>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    {classList.length === 0 ? <p className="text-center py-10 text-slate-400 italic font-bold">학생 명단을 먼저 등록해 주세요.</p> : (studentData[currentClass] || []).map(student => {
                                        const sRecs = Object.values(records).filter(r => r.className === currentClass && r.studentId === student.id).sort((a,b)=>a.week-b.week);
                                        if (sRecs.length === 0) return null;
                                        return (
                                            <div key={student.id} className="bg-slate-50 rounded-2xl p-6 border border-slate-100">
                                                <h3 className="font-black text-lg text-slate-800 mb-4">{student.id}번 {student.name}</h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                                                    {sRecs.map(r => (
                                                        <div key={r.week} className="bg-white p-3 rounded-xl border border-slate-100 text-[11px] shadow-sm">
                                                            <div className="flex justify-between mb-1 border-b border-slate-50 pb-1 font-bold text-indigo-600"><span>Week {r.week}</span><span className={r.attitude==='매우우수'?'text-amber-500':'text-slate-400'}>{r.attitude}</span></div>
                                                            <p className="text-slate-700 italic mt-1 leading-relaxed">"{r.memo || "기록 없음"}"</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {viewMode === 'settings' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade-in pb-12">
                                
                                <div className="bg-slate-900 rounded-3xl p-6 shadow-xl lg:col-span-3 border border-white/10">
                                    <div className="flex items-center gap-2 mb-4">
                                        <Icon name="home" className="text-amber-400"/> 
                                        <h2 className="text-base font-black text-amber-400 uppercase tracking-widest">System Profile Settings</h2>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">학교명 설정</label>
                                            <input type="text" value={schoolName} onChange={(e) => {setSchoolName(e.target.value); persist(STORAGE_KEYS.SCHOOL, e.target.value);}} className="w-full bg-white/10 text-white rounded-xl px-4 py-3 outline-none border border-white/5 focus:ring-1 focus:ring-amber-500 font-bold" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">과목명 설정</label>
                                            <input type="text" value={subjectName} onChange={(e) => {setSubjectName(e.target.value); persist(STORAGE_KEYS.SUBJECT, e.target.value);}} className="w-full bg-white/10 text-white rounded-xl px-4 py-3 outline-none border border-white/5 focus:ring-1 focus:ring-amber-500 font-bold" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black text-slate-400 uppercase mb-2">담당교사 성함</label>
                                            <input type="text" value={teacherName} onChange={(e) => {setTeacherName(e.target.value); persist(STORAGE_KEYS.TEACHER, e.target.value);}} className="w-full bg-white/10 text-white rounded-xl px-4 py-3 outline-none border border-white/5 focus:ring-1 focus:ring-amber-500 font-bold" />
                                        </div>
                                    </div>
                                    <div className="mt-6 flex justify-end">
                                        <button onClick={() => showToast('프로필 정보가 저장되었습니다.')} className="bg-amber-500 text-white px-8 py-3 rounded-xl font-black text-sm transition-all hover:bg-amber-400 shadow-lg shadow-amber-500/20">저장 완료</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-base font-black flex items-center gap-2 text-slate-800"><Icon name="users" className="text-amber-500"/> 학생 명단</h2>
                                        <button onClick={() => downloadSample('students')} className="text-[10px] font-bold text-indigo-600 underline">샘플 CSV</button>
                                    </div>
                                    <div className="mb-4 p-3 bg-amber-50 rounded-xl border border-amber-100 text-[10px]">
                                        <input type="file" accept=".csv" onChange={(e) => handleFileUpload(e, 'students')} className="w-full text-slate-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-amber-100 file:text-amber-700 font-bold" />
                                    </div>
                                    <div className="space-y-4 max-h-[400px] overflow-y-auto custom-scrollbar pr-1 font-bold">
                                        {classList.map(cls => (
                                            <div key={cls} className="p-3 bg-slate-50 rounded-xl border border-slate-100 group">
                                                <div className="flex justify-between mb-2 font-black text-xs text-slate-800">
                                                    <span>{cls}</span>
                                                    <button onClick={() => deleteClass(cls)} className="text-rose-400 opacity-0 group-hover:opacity-100 transition-opacity underline">삭제</button>
                                                </div>
                                                <textarea className="w-full bg-white rounded-xl p-2 text-[10px] h-20 outline-none border-none focus:ring-1 focus:ring-amber-500 shadow-inner" defaultValue={(studentData[cls]||[]).map(s=>s.name).join('\n')} onBlur={(e)=> { const names = e.target.value.split(/[\n,]+/).map(n=>n.trim()).filter(n=>n); const newData = {...studentData,[cls]:names.map((n,i)=>({id:i+1, name:n}))}; setStudentData(newData); persist(STORAGE_KEYS.STUDENTS,newData); }} />
                                            </div>
                                        ))}
                                        <button onClick={()=>{const n=prompt("학급명(예: 1-1)?"); if(n){const d={...studentData,[n]:[]}; setStudentData(d); persist(STORAGE_KEYS.STUDENTS,d); setCurrentClass(n);}}} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm hover:bg-slate-800 transition-all">+ 학급 추가</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-base font-black flex items-center gap-2 text-slate-800"><Icon name="map" className="text-indigo-500"/> 로드맵 설정</h2>
                                        <button onClick={() => downloadSample('plan')} className="text-[10px] font-bold text-indigo-600 underline">샘플 CSV</button>
                                    </div>
                                    <div className="mb-4 p-3 bg-indigo-50 rounded-xl border border-indigo-100 text-[10px]">
                                        <input type="file" accept=".csv" onChange={(e) => handleFileUpload(e, 'plan')} className="w-full text-slate-500 file:mr-4 file:py-1 file:px-3 file:rounded-full file:border-0 file:bg-indigo-100 file:text-indigo-700 font-bold" />
                                    </div>
                                    <div className="space-y-3 flex-1 overflow-y-auto max-h-[400px] custom-scrollbar pr-2">
                                        {lessonPlan.map(lp => (
                                            <div key={lp.week} className="p-3 bg-slate-50 rounded-xl group relative border border-slate-100">
                                                <button onClick={() => deleteWeek(lp.week)} className="absolute -top-1 -right-1 bg-rose-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-md">
                                                    <Icon name="x" size={10}/>
                                                </button>
                                                <span className="text-[8px] font-black text-indigo-400 uppercase">WEEK {lp.week}</span>
                                                <input type="text" className="w-full bg-white rounded-lg px-3 py-1.5 text-xs font-bold mb-1 border-none focus:ring-1 focus:ring-indigo-500 shadow-sm" value={lp.topic} onChange={(e)=>{const n=[...lessonPlan]; n.find(x=>x.week===lp.week).topic=e.target.value; setLessonPlan(n); persist(STORAGE_KEYS.PLAN,n);}} />
                                                <input type="text" className="w-full bg-white rounded-lg px-3 py-1.5 text-[9px] border-none focus:ring-1 focus:ring-indigo-500 shadow-sm" value={lp.activity} onChange={(e)=>{const n=[...lessonPlan]; n.find(x=>x.week===lp.week).activity=e.target.value; setLessonPlan(n); persist(STORAGE_KEYS.PLAN,n);}} />
                                            </div>
                                        ))}
                                        <button onClick={()=>{const n=[...lessonPlan,{week:lessonPlan.length+1,topic:"새 주제",activity:"내용"}]; setLessonPlan(n); persist(STORAGE_KEYS.PLAN,n);}} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-black text-xs hover:bg-indigo-700 transition-all">+ 주차 추가</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col font-bold">
                                    <h2 className="text-base font-black mb-4 flex items-center gap-2 text-slate-800"><Icon name="tag" className="text-emerald-500"/> 평가 퀵 키워드</h2>
                                    <div className="flex gap-1 mb-4">
                                        <input type="text" value={newKeyword} onChange={(e)=>setNewKeyword(e.target.value)} onKeyPress={(e)=>e.key==='Enter' && (()=>{ if(newKeyword){const u=[...customKeywords, newKeyword]; setCustomKeywords(u); persist(STORAGE_KEYS.KEYWORDS,u); setNewKeyword(""); showToast('추가됨');} })()} placeholder="새 평가어..." className="flex-1 bg-slate-100 rounded-xl px-4 py-2 text-xs outline-none border-none focus:ring-1 focus:ring-emerald-500" />
                                        <button onClick={()=>{if(newKeyword){const u=[...customKeywords, newKeyword]; setCustomKeywords(u); persist(STORAGE_KEYS.KEYWORDS,u); setNewKeyword(""); showToast('추가됨');}}} className="bg-emerald-600 text-white p-2 px-4 rounded-xl font-bold">+</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2 overflow-y-auto max-h-[300px] custom-scrollbar pr-1">
                                        {customKeywords.map(kw => (
                                            <div key={kw} className="flex items-center gap-1 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200 group transition-all hover:bg-white">
                                                <span className="text-[10px] font-black text-slate-600">{kw}</span>
                                                <button onClick={()=>{const u=customKeywords.filter(k=>k!==kw); setCustomKeywords(u); persist(STORAGE_KEYS.KEYWORDS,u);}} className="text-slate-300 hover:text-rose-500 transition-colors">×</button>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-auto pt-8 border-t border-slate-100 no-print">
                                        <h3 className="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-3 italic">Danger Zone</h3>
                                        <button onClick={handleResetSystem} className="w-full py-4 bg-white border-2 border-rose-100 text-rose-500 rounded-2xl text-xs font-black hover:bg-rose-50 transition-all flex items-center justify-center gap-2">
                                            <Icon name="trash-2" size={14} /> 시스템 데이터 전체 초기화
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200 p-4 flex justify-center z-40 no-print shadow-inner">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse" />
                                <span className="text-[9px] font-black text-slate-500 uppercase tracking-tighter italic">Collaboration Engine</span>
                            </div>
                            <div className="w-px h-3 bg-slate-200" />
                            <div className="flex flex-col items-center">
                                <p className="text-[10px] text-slate-500 font-black tracking-tight italic">
                                    © 꿈 소믈리에 x Gemini | {schoolName} • {subjectName} 스마트 수업 기록부 V7.8
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
